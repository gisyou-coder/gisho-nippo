<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1320">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>技匠 作業日報</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0d1320;--bg2:#111927;--bg3:#131c2e;
  --border:#1e2d44;--border2:#2a3a55;
  --text:#c8deff;--text2:#7a9abf;--text3:#4a6a8a;
  --accent:#3b82f6;--accent2:#1e4a8a;
  --green:#22c55e;--red:#ef4444;--orange:#f97316;--yellow:#eab308;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;font-size:14px;min-height:100vh;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.header-title{font-size:16px;font-weight:700;color:var(--text);flex:1;}
.header-edit-btn{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:11px;padding:4px 10px;cursor:pointer;}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{flex:1;min-width:60px;padding:10px 4px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{padding:16px;max-width:600px;margin:0 auto;}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.month-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:6px 14px;cursor:pointer;font-size:13px;}
.month-label{flex:1;text-align:center;font-size:15px;font-weight:600;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card-title{font-size:13px;font-weight:600;color:var(--text2);}
label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;margin-top:12px;}
label:first-child{margin-top:0;}
input,select,textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;}
select option{background:var(--bg2);}
.btn{padding:9px 18px;border-radius:7px;border:none;font-size:13px;cursor:pointer;font-weight:600;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-danger{background:none;border:1px solid var(--red);color:var(--red);padding:5px 10px;font-size:12px;border-radius:5px;cursor:pointer;}
.btn-ghost{background:none;border:1px dashed var(--border2);border-radius:5px;color:var(--text3);font-size:12px;padding:5px 12px;cursor:pointer;margin-top:6px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-map{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:#34d399;font-size:12px;padding:7px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.addr-wrap{position:relative;}
.addr-row{display:flex;gap:6px;align-items:flex-start;}
.addr-candidates{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;z-index:200;max-height:200px;overflow-y:auto;margin-top:2px;}
.addr-candidate{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);}
.addr-candidate:last-child{border-bottom:none;}
.addr-candidate:hover{background:var(--bg3);}
.addr-searching{padding:10px 12px;color:var(--text3);font-size:12px;}
.contract-box{background:var(--bg3);border:1px solid var(--accent2);border-radius:8px;padding:12px;margin-bottom:10px;}
.contract-amount{font-size:20px;font-weight:700;color:var(--green);}
.detail-table{width:100%;border-collapse:collapse;margin-top:6px;}
.detail-table th{font-size:11px;color:var(--text3);padding:4px 6px;text-align:left;border-bottom:1px solid var(--border);}
.detail-table td{padding:3px 3px;}
.detail-table input,.detail-table select{padding:5px 8px;font-size:13px;}
.sub-total{font-size:12px;color:var(--text2);text-align:right;margin-top:4px;}
.summary-panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px;}
.summary-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
.summary-row:last-child{border-bottom:none;font-weight:700;font-size:14px;}
.summary-label{color:var(--text2);}
.summary-value.green{color:var(--green);}
.summary-value.red{color:var(--red);}
.report-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;}
.report-item:hover{border-color:var(--border2);}
.report-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.report-site{font-size:14px;font-weight:600;}
.report-date{font-size:12px;color:var(--text3);}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.badge-green{background:#14532d44;color:var(--green);}
.badge-red{background:#7f1d1d44;color:var(--red);}
.badge-blue{background:#1e3a8a44;color:#60a5fa;}
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:500;display:flex;align-items:flex-end;}
.modal{background:var(--bg2);border-radius:14px 14px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;}
.master-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:8px;}
.master-item span{flex:1;font-size:13px;}
.breakdown-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.breakdown-name{color:var(--text2);}
.breakdown-val.green{color:var(--green);}
.breakdown-val.red{color:var(--red);}
.title-input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:16px;font-weight:600;outline:none;}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;}
/* 高速選択ドロップダウン */
.hwy-select{padding:5px 8px;font-size:12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);}
@media(min-width:600px){.content{padding:20px;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===================== STORAGE =====================
// v3/v4と同じキーを維持（データ引き継ぎ）
const SK='gisho_nippo_v3';
const MK='gisho_master_v3';
const CK='gisho_clients_v3';
const TK='gisho_title_v1';
const SITEMK='gisho_sitemaster_v1';
// 新規追加キー
const SUBMK='gisho_submaster_v1';   // {会社名:{unitPrice:0}}
const MATMK='gisho_matmaster_v1';   // {品名:{qty:0,price:0}}
const CONMK='gisho_conmaster_v1';   // {品名:{qty:0,price:0}}
const HWYMK='gisho_hwymaster_v1';   // [{id,from,to,oneway,roundtrip}]

const load=k=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch{return null;}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const loadReports=()=>load(SK)||{};
const saveReports=d=>save(SK,d);
const loadMaster=()=>load(MK)||{sites:[],clients:[],workers:[],subs:[],materials:[],consumables:[]};
const saveMaster=m=>save(MK,m);
const loadClients=()=>load(CK)||{};
const saveClients=c=>save(CK,c);
const loadTitle=()=>load(TK)||'株式会社技匠 作業日報';
const saveTitle=t=>save(TK,t);
const loadSiteMaster=()=>load(SITEMK)||{};
const saveSiteMaster=s=>save(SITEMK,s);
const loadSubMaster=()=>load(SUBMK)||{};       // {会社名:{unitPrice}}
const saveSubMaster=s=>save(SUBMK,s);
const loadMatMaster=()=>load(MATMK)||{};       // {品名:{qty,price}}
const saveMatMaster=s=>save(MATMK,s);
const loadConMaster=()=>load(CONMK)||{};
const saveConMaster=s=>save(CONMK,s);
const loadHwyMaster=()=>load(HWYMK)||[];       // [{id,from,to,oneway,roundtrip}]
const saveHwyMaster=s=>save(HWYMK,s);

// ===================== HELPERS =====================
const fmt=n=>Math.round(n).toLocaleString('ja-JP');
const ym=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const ymd=d=>`${ym(d)}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>ymd(new Date());
const newId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const newRow=()=>({id:newId(),name:'',qty:'',price:''});
const newTRow=()=>({id:newId(),name:'',price:''});

const calcRows=rows=>rows.reduce((s,r)=>{
  const q=parseFloat(r.qty)||0,p=parseFloat(r.price)||0;return s+q*p;
},0);
const calcTRows=rows=>rows.reduce((s,r)=>s+(parseFloat(r.price)||0),0);

const contractTotal=(siteName,siteMaster)=>{
  const sm=siteMaster[siteName];if(!sm) return 0;
  const base=parseFloat(sm.contractAmount)||0;
  const adj=(sm.adjustments||[]).reduce((s,a)=>{
    const v=parseFloat(a.amount)||0;return a.type==='add'?s+v:s-v;
  },0);
  return base+adj;
};

// ===================== ADDRESS SEARCH =====================
let addrTimer=null;
async function searchAddress(query,callback){
  clearTimeout(addrTimer);
  if(!query||query.length<2){callback([]);return;}
  addrTimer=setTimeout(async()=>{
    try{
      const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=jp&limit=5&addressdetails=1&accept-language=ja`;
      const res=await fetch(url,{headers:{'User-Agent':'gisho-nippo/1.0'}});
      const data=await res.json();
      const results=data.map(item=>{
        const a=item.address;
        const parts=[a.province||a.state||'',a.city||a.town||a.village||a.county||'',a.suburb||a.neighbourhood||'',a.road||'',a.house_number||''].filter(Boolean);
        return{display:parts.join(''),full:item.display_name};
      });
      callback(results);
    }catch{callback([]);}
  },500);
}

// ===================== STATE =====================
let state={
  tab:'home',ym:ym(new Date()),
  reports:loadReports(),
  master:loadMaster(),
  clients:loadClients(),
  siteMaster:loadSiteMaster(),
  subMaster:loadSubMaster(),
  matMaster:loadMatMaster(),
  conMaster:loadConMaster(),
  hwyMaster:loadHwyMaster(),
  title:loadTitle(),
  editingId:null,
  showTitleModal:false,
  showMasterTab:'sites',
  reportFilter:'all',
  reportFilterYm:ym(new Date()),
};

// ===================== RENDER =====================
function render(){document.getElementById('app').innerHTML=buildApp();attachEvents();}

function buildApp(){
  return`${buildHeader()}${buildTabs()}
    <div class="content">
      ${state.tab==='home'?buildHome():
        state.tab==='new'?buildForm(null):
        state.tab==='reports'?buildReports():
        state.tab==='summary'?buildSummary():
        state.tab==='master'?buildMaster():
        state.tab==='settings'?buildSettings():''}
    </div>
    ${state.editingId?buildEditModal():''}
    ${state.showTitleModal?buildTitleModal():''}`;
}

function buildHeader(){
  return`<div class="header">
    <div class="header-title">${state.title}</div>
    <button class="header-edit-btn" id="btn-edit-title">✏️ タイトル</button>
  </div>`;
}
function buildTabs(){
  const tabs=[{id:'home',label:'🏠 ホーム'},{id:'new',label:'＋ 新規'},{id:'reports',label:'📋 日報'},{id:'summary',label:'💹 収支'},{id:'master',label:'⚙ マスタ'},{id:'settings',label:'🔧 設定'}];
  return`<div class="tabs">${tabs.map(t=>`<button class="tab${state.tab===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`).join('')}</div>`;
}

// ── HOME ──
function buildHome(){
  const rpts=Object.values(state.reports).filter(r=>r.date&&r.date.startsWith(state.ym));
  const totalExp=rpts.reduce((s,r)=>s+calcExp(r),0);
  const sites=[...new Set(rpts.map(r=>r.site).filter(Boolean))];
  const totalContract=sites.reduce((s,site)=>s+contractTotal(site,state.siteMaster),0);
  const profit=totalContract-totalExp;
  const recent=[...Object.values(state.reports)].sort((a,b)=>b.date>a.date?1:-1).slice(0,5);
  const ymDate=new Date(state.ym+'-01');
  const ymLabel=`${ymDate.getFullYear()}年${ymDate.getMonth()+1}月`;
  return`
    <div class="month-nav">
      <button class="month-btn" id="btn-prev-ym">＜</button>
      <div class="month-label">${ymLabel}</div>
      <button class="month-btn" id="btn-next-ym">＞</button>
    </div>
    <div class="summary-panel">
      <div class="summary-row"><span class="summary-label">請負金額合計</span><span class="summary-value">¥${fmt(totalContract)}</span></div>
      <div class="summary-row"><span class="summary-label">経費合計</span><span class="summary-value">¥${fmt(totalExp)}</span></div>
      <div class="summary-row"><span class="summary-label">粗利益</span><span class="summary-value ${profit>=0?'green':'red'}">¥${fmt(profit)}</span></div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">直近の日報</div>
    ${recent.length===0?'<div class="loading">日報がまだありません</div>':recent.map(r=>buildReportItem(r)).join('')}`;
}

function calcExp(r){
  // 外注費も経費に含める
  const subCost=(r.subs||[]).reduce((s,sub)=>{
    const sm=state.subMaster[sub.name];
    if(!sm||!sm.unitPrice) return s;
    return s+(parseFloat(sm.unitPrice)||0)*(parseFloat(sub.count)||0);
  },0);
  return calcRows(r.materials||[])
       +calcRows(r.consumables||[])
       +calcTRows(r.highways||[])
       +calcTRows(r.parkings||[])
       +subCost;
}

// ── FORM ──
function buildForm(id){
  const r=id?state.reports[id]:{
    id:newId(),date:today(),site:'',address:'',distance:'',client:'',
    workers:[{id:newId(),name:'',count:''}],
    subs:[{id:newId(),name:'',count:''}],
    work:'',materials:[newRow()],consumables:[newRow()],
    highways:[newTRow()],parkings:[newTRow()],note:''
  };
  const mats=r.materials||[newRow()];
  const cons=r.consumables||[newRow()];
  const hwys=r.highways||[newTRow()];
  const pkgs=r.parkings||[newTRow()];
  const masterSites=state.master.sites||[];
  const masterClients=state.master.clients||[];
  const siteName=r.site||'';
  const sm=state.siteMaster[siteName]||{};
  const contractBase=parseFloat(sm.contractAmount)||0;
  const adjs=sm.adjustments||[];
  const contractTot=contractTotal(siteName,state.siteMaster);
  const hwyMaster=state.hwyMaster||[];

  return`
    <div class="card">
      <div class="card-title">基本情報</div>
      <label>日付</label>
      <input type="date" id="f-date" value="${r.date||today()}">
      <label>現場名</label>
      <input type="text" id="f-site" value="${r.site||''}" placeholder="現場名を入力" list="list-sites" autocomplete="off">
      <datalist id="list-sites">${masterSites.map(s=>`<option value="${s}">`).join('')}</datalist>
      <label>住所</label>
      <div class="addr-row">
        <div class="addr-wrap" style="flex:1;">
          <input type="text" id="f-address" value="${r.address||''}" placeholder="住所を入力（候補が出ます）" autocomplete="off">
          <div class="addr-candidates" id="addr-candidates" style="display:none;"></div>
        </div>
        <button class="btn-map" id="btn-map-open">🗺 マップ</button>
      </div>
      <label>移動距離（km）</label>
      <input type="number" id="f-distance" value="${r.distance||''}" placeholder="0">
      <label>元請け</label>
      <input type="text" id="f-client" value="${r.client||''}" placeholder="元請け会社名" list="list-clients">
      <datalist id="list-clients">${masterClients.map(c=>`<option value="${c}">`).join('')}</datalist>
    </div>

    <div class="card">
      <div class="card-title">請負金額</div>
      ${siteName?`
        <div class="contract-box">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">現場マスタの請負金額</div>
          <div class="contract-amount">¥${fmt(contractBase)}</div>
          ${adjs.length>0?`
            <div style="margin-top:8px;font-size:12px;color:var(--text3);">調整履歴</div>
            ${adjs.map(a=>`
              <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border);">
                <span style="color:var(--text2);">${a.label||'調整'}</span>
                <span style="color:${a.type==='add'?'var(--green)':'var(--red)'};">${a.type==='add'?'+':'-'}¥${fmt(Math.abs(parseFloat(a.amount)||0))}</span>
              </div>`).join('')}
            <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding:6px 0;">
              <span>確定請負金額</span><span style="color:var(--green);">¥${fmt(contractTot)}</span>
            </div>
          `:''}
        </div>
        <div style="font-size:11px;color:var(--text3);">変更はマスタタブ→現場から行ってください</div>
      `:`<div style="font-size:13px;color:var(--text3);padding:10px 0;">現場名を入力するとマスタの請負金額が表示されます</div>`}
    </div>

    <div class="card">
      <div class="card-title">作業員</div>
      <div id="workers-wrap">
        ${(r.workers||[]).map((w,i)=>buildPersonRow('worker',w,i)).join('')}
      </div>
      <button class="btn-ghost" id="btn-add-worker">＋ 作業員追加</button>
    </div>

    <div class="card">
      <div class="card-title">外注</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px;">マスタに常用単価を登録しておくと外注費が自動計算されます</div>
      <div id="subs-wrap">
        ${(r.subs||[]).map((s,i)=>buildSubRow(s,i)).join('')}
      </div>
      <button class="btn-ghost" id="btn-add-sub">＋ 外注追加</button>
    </div>

    <div class="card">
      <div class="card-title">作業内容</div>
      <textarea id="f-work" placeholder="作業内容を入力">${r.work||''}</textarea>
    </div>

    <div class="card">
      <div class="card-title">材料費</div>
      <table class="detail-table">
        <thead><tr><th>品名</th><th>数量</th><th>単価</th><th></th></tr></thead>
        <tbody id="materials-body">
          ${mats.map((m,i)=>buildDetailRow('mat',m,i)).join('')}
        </tbody>
      </table>
      <div class="sub-total" id="mat-total">合計: ¥${fmt(calcRows(mats))}</div>
      <button class="btn-ghost" id="btn-add-mat">＋ 行追加</button>
    </div>

    <div class="card">
      <div class="card-title">消耗品費</div>
      <table class="detail-table">
        <thead><tr><th>品名</th><th>数量</th><th>単価</th><th></th></tr></thead>
        <tbody id="consumables-body">
          ${cons.map((c,i)=>buildDetailRow('con',c,i)).join('')}
        </tbody>
      </table>
      <div class="sub-total" id="con-total">合計: ¥${fmt(calcRows(cons))}</div>
      <button class="btn-ghost" id="btn-add-con">＋ 行追加</button>
    </div>

    <div class="card">
      <div class="card-title">高速代</div>
      ${hwyMaster.length>0?`
        <div style="margin-bottom:8px;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;">マスタから選んで追加</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;" id="hwy-presets">
            ${hwyMaster.map(h=>`
              <button class="btn-ghost btn-sm hwy-preset-btn"
                data-label="${h.from}→${h.to}"
                data-oneway="${h.oneway||0}"
                data-roundtrip="${h.roundtrip||0}"
                style="margin-top:0;">
                ${h.from}→${h.to}
              </button>
            `).join('')}
          </div>
        </div>
      `:''}
      <table class="detail-table">
        <thead><tr><th>区間・メモ</th><th>金額</th><th></th></tr></thead>
        <tbody id="highways-body">
          ${hwys.map((h,i)=>buildTransRow('hwy',h,i)).join('')}
        </tbody>
      </table>
      <div class="sub-total" id="hwy-total">合計: ¥${fmt(calcTRows(hwys))}</div>
      <button class="btn-ghost" id="btn-add-hwy">＋ 手動追加</button>
    </div>

    <div class="card">
      <div class="card-title">駐車場代</div>
      <table class="detail-table">
        <thead><tr><th>場所・メモ</th><th>金額</th><th></th></tr></thead>
        <tbody id="parkings-body">
          ${pkgs.map((p,i)=>buildTransRow('pkg',p,i)).join('')}

function buildReportItem(r,clickable=false){

// ── SUMMARY ──
function buildSummary(){
  const clients=state.master.clients||[];
  const allRpts=Object.values(state.reports);
  const ymDate=new Date(state.reportFilterYm+'-01');
  const ymLabel=`${ymDate.getFullYear()}年${ymDate.getMonth()+1}月`;
  let filtered=allRpts.filter(r=>{
    if(!r.date) return false;
    return state.reportFilter==='all'?r.date.startsWith(state.reportFilterYm):r.client===state.reportFilter&&r.date.startsWith(state.reportFilterYm);
  });
  const sites=[...new Set(filtered.map(r=>r.site).filter(Boolean))];
  const totalContract=sites.reduce((s,site)=>s+contractTotal(site,state.siteMaster),0);
  const totalExp=filtered.reduce((s,r)=>s+calcExp(r),0);
  const profit=totalContract-totalExp;
  const margin=totalContract>0?(profit/totalContract*100).toFixed(1):'0.0';
  const clientSummary={};
  allRpts.filter(r=>r.date&&r.date.startsWith(state.reportFilterYm)).forEach(r=>{
    const c=r.client||'（未設定）';
    if(!clientSummary[c]) clientSummary[c]={sites:new Set(),exp:0,count:0};
    if(r.site) clientSummary[c].sites.add(r.site);
    clientSummary[c].exp+=calcExp(r);clientSummary[c].count++;
  });
  return`
    <div class="month-nav">
      <button class="month-btn" id="btn-prev-ym-s">＜</button>
      <div class="month-label">${ymLabel}</div>
      <button class="month-btn" id="btn-next-ym-s">＞</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      <button class="btn btn-sm ${state.reportFilter==='all'?'btn-primary':'btn-ghost'}" data-filter="all">全体</button>
      ${clients.map(c=>`<button class="btn btn-sm ${state.reportFilter===c?'btn-primary':'btn-ghost'}" data-filter="${c}">${c}</button>`).join('')}
    </div>
    <div class="summary-panel">
      <div class="summary-row"><span class="summary-label">請負金額合計</span><span class="summary-value">¥${fmt(totalContract)}</span></div>
      <div class="summary-row"><span class="summary-label">経費合計</span><span class="summary-value">¥${fmt(totalExp)}</span></div>
      <div class="summary-row"><span class="summary-label">粗利益</span><span class="summary-value ${profit>=0?'green':'red'}">¥${fmt(profit)}</span></div>
      <div class="summary-row"><span class="summary-label">粗利率</span><span class="summary-value ${profit>=0?'green':'red'}">${margin}%</span></div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">元請け別（${ymLabel}）</div>
    ${Object.entries(clientSummary).map(([name,d])=>{
      const ct2=[...d.sites].reduce((s,site)=>s+contractTotal(site,state.siteMaster),0);
      const p=ct2-d.exp;const m=ct2>0?(p/ct2*100).toFixed(1):'0.0';
      const cd=state.clients[name];
      return`<div class="card" style="margin-bottom:10px;">
        <div class="card-header">
          <div class="card-title">${name}</div>
          <div style="font-size:11px;color:var(--text3);">締め日:${cd?cd.closingDay+'日':'未設定'} / ${d.count}件</div>
        </div>
        <div class="breakdown-item"><span class="breakdown-name">請負金額</span><span class="breakdown-val">¥${fmt(ct2)}</span></div>
        <div class="breakdown-item"><span class="breakdown-name">経費</span><span class="breakdown-val">¥${fmt(d.exp)}</span></div>
        <div class="breakdown-item"><span class="breakdown-name">粗利益</span><span class="breakdown-val ${p>=0?'green':'red'}">¥${fmt(p)}</span></div>
        <div class="breakdown-item"><span class="breakdown-name">粗利率</span><span class="breakdown-val ${p>=0?'green':'red'}">${m}%</span></div>
      </div>`;
    }).join('')||'<div class="loading">この月のデータはありません</div>'}`;
}

}

function buildEditModal(){
  return`<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div style="display:flex;align-items:center;margin-bottom:16px;">
        <div class="modal-title" style="margin:0;">日報を編集</div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      ${buildForm(state.editingId)}
    </div>
  </div>`;
}

function buildTitleModal(){
  return`<div class="modal-overlay" id="title-modal-overlay">
    <div class="modal">
      <div style="display:flex;align-items:center;margin-bottom:16px;">
        <div class="modal-title" style="margin:0;">タイトルを変更</div>
        <button class="modal-close" id="title-modal-close">✕</button>
      </div>
      <label>アプリタイトル</label>
      <input class="title-input" id="title-input-val" value="${state.title}">
      <div style="margin-top:14px;">
        <button class="btn btn-primary" id="btn-save-title" style="width:100%;">保存</button>
      </div>
    </div>
  </div>`;
}

// ===================== COLLECT FORM =====================
function collectForm(){
  const workers=[];
  document.querySelectorAll('[data-w-idx]').forEach(row=>{
    const name=row.querySelector('.w-name')?.value||'';
    const count=row.querySelector('.w-count')?.value||'';
    if(name||count) workers.push({id:newId(),name,count});
  });
  const subs=[];
  document.querySelectorAll('[data-s-idx]').forEach(row=>{
    const name=row.querySelector('.s-name')?.value||'';
    const count=row.querySelector('.s-count')?.value||'';
    if(name||count) subs.push({id:newId(),name,count});
  });
  const materials=[];
  document.querySelectorAll('[data-mat-idx]').forEach(row=>{
    materials.push({id:newId(),name:row.querySelector('.mat-name')?.value||'',qty:row.querySelector('.mat-qty')?.value||'',price:row.querySelector('.mat-price')?.value||''});
  });
  const consumables=[];
  document.querySelectorAll('[data-con-idx]').forEach(row=>{
    consumables.push({id:newId(),name:row.querySelector('.con-name')?.value||'',qty:row.querySelector('.con-qty')?.value||'',price:row.querySelector('.con-price')?.value||''});
  });
  const highways=[];
  document.querySelectorAll('[data-hwy-idx]').forEach(row=>{
    highways.push({id:newId(),name:row.querySelector('.hwy-name')?.value||'',price:row.querySelector('.hwy-price')?.value||''});
  });
  const parkings=[];
  document.querySelectorAll('[data-pkg-idx]').forEach(row=>{
    parkings.push({id:newId(),name:row.querySelector('.pkg-name')?.value||'',price:row.querySelector('.pkg-price')?.value||''});
  });
  return{
    date:document.getElementById('f-date')?.value||today(),
    site:document.getElementById('f-site')?.value||'',
    address:document.getElementById('f-address')?.value||'',
    distance:document.getElementById('f-distance')?.value||'',
    client:document.getElementById('f-client')?.value||'',
    workers,subs,work:document.getElementById('f-work')?.value||'',
    materials,consumables,highways,parkings,
    note:document.getElementById('f-note')?.value||'',
  };
}

// ===================== EVENTS =====================
function attachEvents(){
  document.querySelectorAll('[data-tab]').forEach(btn=>{btn.onclick=()=>{state.tab=btn.dataset.tab;render();};});
  // title
  document.getElementById('btn-edit-title')?.addEventListener('click',()=>{state.showTitleModal=true;render();});
  document.getElementById('title-modal-close')?.addEventListener('click',()=>{state.showTitleModal=false;render();});
  document.getElementById('title-modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='title-modal-overlay'){state.showTitleModal=false;render();}});
  document.getElementById('btn-save-title')?.addEventListener('click',()=>{
    const val=document.getElementById('title-input-val')?.value.trim();
    if(val){state.title=val;saveTitle(val);state.showTitleModal=false;render();}
  });
  // month nav
  document.getElementById('btn-prev-ym')?.addEventListener('click',()=>{const d=new Date(state.ym+'-01');d.setMonth(d.getMonth()-1);state.ym=ym(d);render();});
  document.getElementById('btn-next-ym')?.addEventListener('click',()=>{const d=new Date(state.ym+'-01');d.setMonth(d.getMonth()+1);state.ym=ym(d);render();});
  document.getElementById('btn-prev-ym-s')?.addEventListener('click',()=>{const d=new Date(state.reportFilterYm+'-01');d.setMonth(d.getMonth()-1);state.reportFilterYm=ym(d);render();});
  document.getElementById('btn-next-ym-s')?.addEventListener('click',()=>{const d=new Date(state.reportFilterYm+'-01');d.setMonth(d.getMonth()+1);state.reportFilterYm=ym(d);render();});
  document.querySelectorAll('[data-filter]').forEach(btn=>{btn.onclick=()=>{state.reportFilter=btn.dataset.filter;render();};});
  // addr
  const addrInput=document.getElementById('f-address');
  const candidatesBox=document.getElementById('addr-candidates');
  if(addrInput&&candidatesBox){
    addrInput.addEventListener('input',()=>{
      const q=addrInput.value.trim();
      if(!q||q.length<2){candidatesBox.style.display='none';return;}
      candidatesBox.innerHTML='<div class="addr-searching">検索中...</div>';
      candidatesBox.style.display='block';
      searchAddress(q,results=>{
        if(!results.length){candidatesBox.style.display='none';return;}
        candidatesBox.innerHTML=results.map(r=>`<div class="addr-candidate" data-addr="${r.display}">${r.display}</div>`).join('');
        candidatesBox.querySelectorAll('.addr-candidate').forEach(el=>{
          el.onclick=()=>{addrInput.value=el.dataset.addr;candidatesBox.style.display='none';};
        });
      });
    });
    document.addEventListener('click',e=>{if(!addrInput.contains(e.target)&&!candidatesBox.contains(e.target)){candidatesBox.style.display='none';}});
  }
  document.getElementById('btn-map-open')?.addEventListener('click',()=>{
    const addr=document.getElementById('f-address')?.value||'';
    const site=document.getElementById('f-site')?.value||'';
    const q=encodeURIComponent(addr||site||'名古屋市');
    window.open(`https://www.google.com/maps/search/?api=1&query=${q}`,'_blank');
  });
  // 高速プリセットボタン
  document.querySelectorAll('.hwy-preset-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const label=btn.dataset.label;
      const oneway=parseFloat(btn.dataset.oneway)||0;
      const roundtrip=parseFloat(btn.dataset.roundtrip)||0;
      // 片道/往復を選択するダイアログ
      const choice=roundtrip>0?confirm(`${label}\n\nOK → 往復 ¥${fmt(roundtrip)}\nキャンセル → 片道 ¥${fmt(oneway)}`):false;
      const price=choice?roundtrip:oneway;
      const name=choice?`${label}（往復）`:`${label}（片道）`;
      // 高速代テーブルに追加
      const tbody=document.getElementById('highways-body');
      const idx=tbody.querySelectorAll('tr').length;
      const tr=document.createElement('tr');
      tr.setAttribute('data-hwy-idx',idx);
      tr.innerHTML=buildTransRow('hwy',{name,price},idx);
      tbody.appendChild(tr);
      updateTotal('highways-body','hwy-total','hwy');
    });
  });
  // save form
  document.getElementById('btn-save-form')?.addEventListener('click',function(){
    const id=this.dataset.id;
    const data=collectForm();data.id=id;
    state.reports[id]=data;saveReports(state.reports);
    const m=state.master;
    if(data.site&&!m.sites.includes(data.site)) m.sites.push(data.site);
    if(data.client&&!m.clients.includes(data.client)) m.clients.push(data.client);
    data.workers.forEach(w=>{if(w.name&&!m.workers.includes(w.name)) m.workers.push(w.name);});
    data.subs.forEach(s=>{if(s.name&&!m.subs.includes(s.name)) m.subs.push(s.name);});
    saveMaster(m);
    state.tab='reports';state.editingId=null;render();
  });
  document.getElementById('btn-delete-form')?.addEventListener('click',function(){
    if(confirm('この日報を削除しますか？')){
      delete state.reports[this.dataset.id];saveReports(state.reports);
      state.editingId=null;state.tab='reports';render();
    }
  });
  // add rows
  document.getElementById('btn-add-worker')?.addEventListener('click',()=>{
    const wrap=document.getElementById('workers-wrap');
    const idx=wrap.querySelectorAll('[data-w-idx]').length;
    const div=document.createElement('div');div.setAttribute('data-w-idx',idx);
    div.innerHTML=buildPersonRow('worker',{name:'',count:''},idx);wrap.appendChild(div);
  });
  document.getElementById('btn-add-sub')?.addEventListener('click',()=>{
    const wrap=document.getElementById('subs-wrap');
    const idx=wrap.querySelectorAll('[data-s-idx]').length;
    const div=document.createElement('div');div.setAttribute('data-s-idx',idx);
    div.innerHTML=buildSubRow({name:'',count:''},idx);wrap.appendChild(div);
  });
  const addDRow=(bodyId,type)=>{
    const tbody=document.getElementById(bodyId);
    const idx=tbody.querySelectorAll('tr').length;
    const tr=document.createElement('tr');tr.setAttribute(`data-${type}-idx`,idx);
    tr.innerHTML=buildDetailRow(type,newRow(),idx);tbody.appendChild(tr);
  };
  document.getElementById('btn-add-mat')?.addEventListener('click',()=>addDRow('materials-body','mat'));
  document.getElementById('btn-add-con')?.addEventListener('click',()=>addDRow('consumables-body','con'));
  const addTRow=(bodyId,type)=>{
    const tbody=document.getElementById(bodyId);
    const idx=tbody.querySelectorAll('tr').length;
    const tr=document.createElement('tr');tr.setAttribute(`data-${type}-idx`,idx);
    tr.innerHTML=buildTransRow(type,newTRow(),idx);tbody.appendChild(tr);
  };
  document.getElementById('btn-add-hwy')?.addEventListener('click',()=>addTRow('highways-body','hwy'));
  document.getElementById('btn-add-pkg')?.addEventListener('click',()=>addTRow('parkings-body','pkg'));
  // totals
  ['mat','con'].forEach(t=>{
    document.getElementById(t==='mat'?'materials-body':'consumables-body')?.addEventListener('input',()=>updateTotal(t==='mat'?'materials-body':'consumables-body',t==='mat'?'mat-total':'con-total',t));
  });
  ['hwy','pkg'].forEach(t=>{
    document.getElementById(t==='hwy'?'highways-body':'parkings-body')?.addEventListener('input',()=>updateTotal(t==='hwy'?'highways-body':'parkings-body',t==='hwy'?'hwy-total':'pkg-total',t));
  });
  // edit
  document.querySelectorAll('[data-edit-id]').forEach(el=>{el.addEventListener('click',()=>{state.editingId=el.dataset.editId;state.tab='reports';render();});});
  document.getElementById('modal-close')?.addEventListener('click',()=>{state.editingId=null;render();});
  document.getElementById('modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='modal-overlay'){state.editingId=null;render();}});
  // master tabs
  document.querySelectorAll('[data-master-tab]').forEach(btn=>{btn.onclick=()=>{state.showMasterTab=btn.dataset.masterTab;render();};});
  document.getElementById('btn-master-add')?.addEventListener('click',()=>{
    const val=document.getElementById('master-new-val')?.value.trim();if(!val) return;
    const t=state.showMasterTab;
    if(!state.master[t]) state.master[t]=[];
    if(!state.master[t].includes(val)) state.master[t].push(val);
    saveMaster(state.master);render();
  });
  document.querySelectorAll('[data-master-del]').forEach(btn=>{
    btn.onclick=()=>{const i=parseInt(btn.dataset.masterDel);state.master[state.showMasterTab].splice(i,1);saveMaster(state.master);render();};
  });
  // 現場請負金額保存
  document.querySelectorAll('.site-contract-save').forEach(btn=>{
    btn.onclick=()=>{
      const site=btn.dataset.site;
      const amount=parseFloat(document.querySelector(`.site-contract[data-site="${site}"]`)?.value)||0;
      if(!state.siteMaster[site]) state.siteMaster[site]={adjustments:[]};
      state.siteMaster[site].contractAmount=amount;saveSiteMaster(state.siteMaster);render();
    };
  });
  document.querySelectorAll('.site-adj-save').forEach(btn=>{
    btn.onclick=()=>{
      const site=btn.dataset.site;
      if(!state.siteMaster[site]) state.siteMaster[site]={contractAmount:0,adjustments:[]};
      const adjs=[];
      document.querySelectorAll(`.adj-type[data-site="${site}"]`).forEach((sel,ai)=>{
        const label=document.querySelector(`.adj-label[data-site="${site}"][data-ai="${ai}"]`)?.value||'';
        const amount=document.querySelector(`.adj-amount[data-site="${site}"][data-ai="${ai}"]`)?.value||'';
        adjs.push({type:sel.value,label,amount});
      });
      state.siteMaster[site].adjustments=adjs;saveSiteMaster(state.siteMaster);render();
    };
  });
  // 外注常用単価保存
  document.querySelectorAll('.sub-unit-save').forEach(btn=>{
    btn.onclick=()=>{
      const sub=btn.dataset.sub;
      const price=parseFloat(document.querySelector(`.sub-unit[data-sub="${sub}"]`)?.value)||0;
      if(!state.subMaster[sub]) state.subMaster[sub]={};
      state.subMaster[sub].unitPrice=price;saveSubMaster(state.subMaster);render();
    };
  });
  // 材料・消耗品マスタ保存
  ['mat','con'].forEach(type=>{
    document.querySelectorAll(`.${type}-master-save`).forEach(btn=>{
      btn.onclick=()=>{
        const item=btn.dataset.item;
        const qty=parseFloat(document.querySelector(`.${type}-master-qty[data-item="${item}"]`)?.value)||0;
        const price=parseFloat(document.querySelector(`.${type}-master-price[data-item="${item}"]`)?.value)||0;
        const master=type==='mat'?state.matMaster:state.conMaster;
        master[item]={qty,price};
        type==='mat'?saveMatMaster(state.matMaster):saveConMaster(state.conMaster);
        render();
      };
    });
  });
  // 高速区間追加
  document.getElementById('btn-hwy-add')?.addEventListener('click',()=>{
    const from=document.getElementById('hwy-new-from')?.value.trim();
    const to=document.getElementById('hwy-new-to')?.value.trim();
    const oneway=parseFloat(document.getElementById('hwy-new-oneway')?.value)||0;
    const roundtrip=parseFloat(document.getElementById('hwy-new-roundtrip')?.value)||0;
    if(!from||!to){alert('乗るICと降りるICを入力してください');return;}
    state.hwyMaster.push({id:newId(),from,to,oneway,roundtrip});
    saveHwyMaster(state.hwyMaster);render();
  });
  document.querySelectorAll('[data-hwy-del]').forEach(btn=>{
    btn.onclick=()=>{state.hwyMaster.splice(parseInt(btn.dataset.hwyDel),1);saveHwyMaster(state.hwyMaster);render();};
  });
  // 元請け締め日保存
  document.querySelectorAll('.client-closing-save').forEach(btn=>{
    btn.onclick=()=>{
      const name=btn.dataset.client;
      const day=parseInt(document.querySelector(`.client-closing[data-client="${name}"]`)?.value)||0;
      if(day<1||day>31){alert('1〜31の数字を入力してください');return;}
      if(!state.clients[name]) state.clients[name]={};
      state.clients[name].closingDay=day;saveClients(state.clients);alert(`${name}の締め日を${day}日に設定しました`);
    };
  });
  // settings
  document.getElementById('btn-import-open')?.addEventListener('click',()=>document.getElementById('import-file')?.click());
  document.getElementById('import-file')?.addEventListener('change',e=>{
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.reports){state.reports=d.reports;saveReports(d.reports);}
        if(d.master){state.master=d.master;saveMaster(d.master);}
        if(d.clients){state.clients=d.clients;saveClients(d.clients);}
        if(d.siteMaster){state.siteMaster=d.siteMaster;saveSiteMaster(d.siteMaster);}
        if(d.subMaster){state.subMaster=d.subMaster;saveSubMaster(d.subMaster);}
        if(d.matMaster){state.matMaster=d.matMaster;saveMatMaster(d.matMaster);}
        if(d.conMaster){state.conMaster=d.conMaster;saveConMaster(d.conMaster);}
        if(d.hwyMaster){state.hwyMaster=d.hwyMaster;saveHwyMaster(d.hwyMaster);}
        if(d.title){state.title=d.title;saveTitle(d.title);}
        alert('取り込み完了しました');render();
      }catch{alert('ファイルの読み込みに失敗しました');}
    };
    reader.readAsText(file);
  });
  document.getElementById('btn-clear-all')?.addEventListener('click',()=>{
    if(confirm('全データを削除します。本当によろしいですか？')){state.reports={};saveReports({});alert('削除しました');render();}
  });
}

// ===================== HELPERS =====================
function updateTotal(bodyId,totalId,type){
  const isDetail=type==='mat'||type==='con';
  let total=0;
  if(isDetail){
    document.querySelectorAll(`[data-${type}-idx]`).forEach(r=>{
      total+=(parseFloat(r.querySelector(`.${type}-qty`)?.value)||0)*(parseFloat(r.querySelector(`.${type}-price`)?.value)||0);
    });
  } else {
    document.querySelectorAll(`[data-${type}-idx]`).forEach(r=>{
      total+=parseFloat(r.querySelector(`.${type}-price`)?.value)||0;
    });
  }
  const el=document.getElementById(totalId);
  if(el) el.textContent='合計: ¥'+fmt(total);
}

// ===================== GLOBAL =====================
window.removeWorker=idx=>document.querySelector(`[data-w-idx="${idx}"]`)?.remove();
window.removeSub=idx=>document.querySelector(`[data-s-idx="${idx}"]`)?.remove();
window.removeDetailRow=(type,idx)=>document.querySelector(`[data-${type}-idx="${idx}"]`)?.remove();
window.removeTransRow=(type,idx)=>document.querySelector(`[data-${type}-idx="${idx}"]`)?.remove();
window.addAdj=site=>{
  if(!state.siteMaster[site]) state.siteMaster[site]={contractAmount:0,adjustments:[]};
  state.siteMaster[site].adjustments.push({type:'add',label:'',amount:''});
  saveSiteMaster(state.siteMaster);render();
};
window.removeAdj=(site,ai)=>{
  state.siteMaster[site].adjustments.splice(ai,1);saveSiteMaster(state.siteMaster);render();
};
// 品名入力でマスタのデフォルト値を自動入力
window.fillMasterDefaults=(type,idx,name)=>{
  const master=type==='mat'?state.matMaster:state.conMaster;
  const d=master[name];if(!d) return;
  const row=document.querySelector(`[data-${type}-idx="${idx}"]`);if(!row) return;
  const qtyEl=row.querySelector(`.${type}-qty`);
  const priceEl=row.querySelector(`.${type}-price`);
  if(qtyEl&&d.qty) qtyEl.value=d.qty;
  if(priceEl&&d.price) priceEl.value=d.price;
  updateTotal(type==='mat'?'materials-body':'consumables-body',type==='mat'?'mat-total':'con-total',type);
};
// 外注行の単価表示更新
window.refreshSubRow=(idx,rowEl)=>{
  if(!rowEl) return;
  const name=rowEl.querySelector('.s-name')?.value||'';
  const count=parseFloat(rowEl.querySelector('.s-count')?.value)||0;
  const sm=state.subMaster[name]||{};
  const info=rowEl.querySelector(`.s-info-${idx}`);
  if(!info) return;
  if(sm.unitPrice){
    const total=sm.unitPrice*count;
    info.textContent=`単価: ¥${fmt(sm.unitPrice)}/人工${count?' / 小計: ¥'+fmt(total):''}`;
    info.style.color='var(--green)';
  } else if(name){
    info.textContent='（マスタに単価未登録）';
    info.style.color='var(--text3)';
  } else {
    info.textContent='';
  }
};

render();
</script>
