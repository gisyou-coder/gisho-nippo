<body>
<div id="app"></div>
<script>
const SK="gisho_r_v6",MK="gisho_m_v6",PK="gisho_pw_v1";
const ld=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{}}catch{return{}}};
const sd=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch{}};
const lm=()=>{try{const r=localStorage.getItem(MK);return r?JSON.parse(r):{sites:[],clients:[],workers:[],subs:[],subRates:{},materialItems:{},consumableItems:{},siteContracts:{}}}catch{return{sites:[],clients:[],workers:[],subs:[],subRates:{},materialItems:{},consumableItems:{},siteContracts:{}}}};
const sm=m=>{try{localStorage.setItem(MK,JSON.stringify(m))}catch{}};
const lpw=()=>{try{return localStorage.getItem(PK)||""}catch{return""}};
const spw=p=>{try{localStorage.setItem(PK,p)}catch{}};
const ym=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
const ymd=d=>`${ym(d)}-${String(d.getDate()).padStart(2,"0")}`;
const nw=()=>new Date();
const nf=n=>Number(n||0).toLocaleString();
const pct=n=>Number(n||0).toFixed(1)+"%";
const cal=rows=>(rows||[]).reduce((s,r)=>s+Number(r.qty||0)*Number(r.unit||0),0);
const uid=()=>crypto.randomUUID();
const eM=()=>({id:uid(),name:"",qty:1,unit:0});
const eC=()=>({id:uid(),name:"",qty:1,unit:0});
const eR=date=>({id:uid(),date:date||ymd(nw()),siteName:"",siteAddress:"",distance:"",client:"",contractAmount:"",workers:[{name:"",count:1,manual:false}],subs:[{company:"",count:1,rate:"",subTotal:0,manual:false}],workContent:"",materialRows:[eM()],consumableRows:[eC()],highwayRows:[{section:"",amount:""}],parking:"",siteNameManual:false,clientManual:false});

function calcProfit(r,master){
  const contract=Number(r.contractAmount||0);
  const matCost=cal(r.materialRows),conCost=cal(r.consumableRows);
  const highwayCost=(r.highwayRows||[]).reduce((s,x)=>s+Number(x.amount||0),0)||Number(r.highway||0);
  const parkingCost=Number(r.parking||0);
  let subCost=0;
  (r.subs||[]).forEach(s=>{
    if(Number(s.subTotal)>0)subCost+=Number(s.subTotal);
    else{const rate=Number(s.rate)||Number((master.subRates||{})[s.company]||0);subCost+=rate*Number(s.count||0);}
  });
  const totalExpense=matCost+conCost+highwayCost+parkingCost+subCost;
  const grossProfit=contract-(matCost+conCost+subCost);
  const netProfit=contract-totalExpense;
  const tp=(r.workers||[]).reduce((s,w)=>s+Number(w.count||0),0)+(r.subs||[]).reduce((s,b)=>s+Number(b.count||0),0);
  return{contract,matCost,conCost,subCost,highwayCost,parkingCost,totalExpense,grossProfit,netProfit,perPerson:tp>0?contract/tp:0,grossRate:contract>0?grossProfit/contract*100:0,netRate:contract>0?netProfit/contract*100:0,totalPeople:tp};
}

function toCSV(reps,master){
  const h=["日付","現場名","住所","移動距離(km)","元請け","請負金額","作業員","自社人数","外注会社","外注人数","外注費計","作業内容","材料明細","材料費計","消耗品明細","消耗品費計","高速明細","高速代","駐車場代","経費合計","粗利額","粗利率","利益率","一人あたり売上"];
  const rows=reps.map(r=>{
    const p=calcProfit(r,master);
    const md=(r.materialRows||[]).filter(x=>x.name).map(x=>`${x.name}×${x.qty}@¥${x.unit}`).join("/");
    const cd=(r.consumableRows||[]).filter(x=>x.name).map(x=>`${x.name}×${x.qty}@¥${x.unit}`).join("/");
    const hd=(r.highwayRows||[]).filter(x=>x.section).map(x=>x.section+"¥"+x.amount).join("/");
    return[r.date,r.siteName,r.siteAddress,r.distance,r.client,p.contract,r.workers.map(w=>w.name).join("/"),r.workers.reduce((s,w)=>s+Number(w.count||0),0),(r.subs||[]).map(s=>s.company).join("/"),(r.subs||[]).reduce((s,b)=>s+Number(b.count||0),0),p.subCost,r.workContent,md,p.matCost,cd,p.conCost,hd,p.highwayCost,p.parkingCost,p.totalExpense,p.grossProfit,p.grossRate.toFixed(1)+"%",p.netRate.toFixed(1)+"%",Math.round(p.perPerson)];
  });
  return[h,...rows].map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
}

let S={tab:"input",data:ld(),master:lm(),month:ym(nw()),er:eR(),eid:null,mtab:"sites",mval:"",mval2:"",mval3:"",toast:null,cdel:null,open:{},_tt:null,pw:lpw(),pwUnlocked:false,pwInput:"",pwError:false,showPwSetup:false,pwSetupStep:0,pwSetupFirst:"",editModal:null};

function h(tag,a,...ch){const el=document.createElement(tag);if(a)Object.entries(a).forEach(([k,v])=>{if(k==="cls")el.className=v;else if(k==="sty")Object.assign(el.style,v);else if(k[0]==="o"&&k[1]==="n")el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v);});ch.flat(9).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c)});return el;}
const D=(a,...c)=>h("div",a,...c);
const Sp=(a,...c)=>h("span",a,...c);
const Bt=(a,...c)=>h("button",a,...c);
const In=(a)=>h("input",a);
function Stat(label,val,sm){return D({cls:"stat-block"},Sp({cls:"stl"},label),D({cls:"stv"+(sm?" sm":"")},val));}

function TxtInp(cls,val,ph,onUpdate,onDone){const el=In({type:"text",cls,value:val||"",placeholder:ph||""});el.addEventListener("input",e=>onUpdate(e.target.value));el.addEventListener("blur",()=>onDone());return el;}
function NumInp(cls,val,ph,onUpdate){const el=In({type:"number",cls,value:val||"",placeholder:ph||""});el.addEventListener("input",e=>onUpdate(e.target.value));el.addEventListener("blur",()=>render());return el;}
function TxtArea(cls,val,ph,onUpdate){const el=h("textarea",{cls,placeholder:ph||""},val||"");el.addEventListener("input",e=>onUpdate(e.target.value));el.addEventListener("blur",()=>render());return el;}

function SelOrTxt(opts,val,ph,setter,isManual,onToggle,sm){
  const wrap=D({cls:"sel-wrap"});
  if(!isManual&&opts.length>0){
    const sel=h("select",{cls:"sel"+(sm?" sel-sm":"")});
    sel.appendChild(h("option",{value:""},"-- 選択 --"));
    opts.forEach(o=>{const op=h("option",{value:o},o);if(o===val)op.selected=true;sel.appendChild(op);});
    sel.addEventListener("change",e=>{setter(e.target.value);render();});
    wrap.appendChild(sel);
    wrap.appendChild(Bt({cls:"mbtn",onclick:()=>{setter("");onToggle(true);render();}},"直接入力"));
  }else{
    const inp=In({type:"text",cls:"inp"+(sm?" inp-sm":""),value:val||"",placeholder:ph||""});
    inp.addEventListener("input",e=>setter(e.target.value));
    inp.addEventListener("blur",()=>render());
    wrap.appendChild(inp);
    if(opts.length>0)wrap.appendChild(Bt({cls:"mbtn on",onclick:()=>{setter("");onToggle(false);render();}},"選択に戻す"));
  }
  return wrap;
}

function CostSec(label,rows,itemMaster,accent,bg,key){
  const total=cal(rows);const names=Object.keys(itemMaster||{});
