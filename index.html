<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1320">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>技匠 作業日報</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #0d1320;
  --bg2: #111927;
  --bg3: #131c2e;
  --border: #1e2d44;
  --border2: #2a3a55;
  --text: #c8deff;
  --text2: #7a9abf;
  --text3: #4a6a8a;
  --accent: #3b82f6;
  --accent2: #1e4a8a;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
  --yellow: #eab308;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;font-size:14px;min-height:100vh;}

/* ── HEADER ── */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.header-title{font-size:16px;font-weight:700;color:var(--text);flex:1;}
.header-edit-btn{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:11px;padding:4px 10px;cursor:pointer;}
.header-edit-btn:hover{background:var(--bg3);}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{flex:1;min-width:60px;padding:10px 4px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── CONTENT ── */
.content{padding:16px;max-width:600px;margin:0 auto;}

/* ── MONTH NAV ── */
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.month-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:6px 14px;cursor:pointer;font-size:13px;}
.month-btn:hover{border-color:var(--accent);}
.month-label{flex:1;text-align:center;font-size:15px;font-weight:600;color:var(--text);}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card-title{font-size:13px;font-weight:600;color:var(--text2);}
.card-date{font-size:12px;color:var(--text3);}

/* ── FORM ── */
label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;margin-top:12px;}
label:first-child{margin-top:0;}
input,select,textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;}
select option{background:var(--bg2);}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border-radius:7px;border:none;font-size:13px;cursor:pointer;font-weight:600;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#2563eb;}
.btn-danger{background:none;border:1px solid var(--red);color:var(--red);padding:5px 10px;font-size:12px;border-radius:5px;cursor:pointer;}
.btn-danger:hover{background:#7f1d1d22;}
.btn-ghost{background:none;border:1px dashed var(--border2);border-radius:5px;color:var(--text3);font-size:12px;padding:5px 12px;cursor:pointer;margin-top:6px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:4px 10px;font-size:12px;}

/* ── ADDRESS SEARCH ── */
.addr-wrap{position:relative;}
.addr-candidates{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;z-index:200;max-height:200px;overflow-y:auto;margin-top:2px;}
.addr-candidate{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);}
.addr-candidate:last-child{border-bottom:none;}
.addr-candidate:hover{background:var(--bg3);}
.addr-searching{padding:10px 12px;color:var(--text3);font-size:12px;}

/* ── DETAIL TABLE ── */
.detail-table{width:100%;border-collapse:collapse;margin-top:6px;}
.detail-table th{font-size:11px;color:var(--text3);padding:4px 6px;text-align:left;border-bottom:1px solid var(--border);}
.detail-table td{padding:4px 4px;}
.detail-table input{padding:5px 8px;font-size:13px;}
.sub-total{font-size:12px;color:var(--text2);text-align:right;margin-top:4px;}

/* ── SUMMARY PANEL ── */
.summary-panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px;}
.summary-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
.summary-row:last-child{border-bottom:none;font-weight:700;font-size:14px;color:var(--text);}
.summary-label{color:var(--text2);}
.summary-value{color:var(--text);}
.summary-value.green{color:var(--green);}
.summary-value.red{color:var(--red);}

/* ── REPORT LIST ── */
.report-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;}
.report-item:hover{border-color:var(--border2);}
.report-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.report-site{font-size:14px;font-weight:600;color:var(--text);}
.report-date{font-size:12px;color:var(--text3);}
.report-meta{font-size:12px;color:var(--text2);}
.report-expense{font-size:12px;color:var(--text3);margin-top:2px;}

/* ── BADGE ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.badge-green{background:#14532d44;color:var(--green);}
.badge-red{background:#7f1d1d44;color:var(--red);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:500;display:flex;align-items:flex-end;}
.modal{background:var(--bg2);border-radius:14px 14px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text);}
.modal-close{float:right;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;}

/* ── MASTER LIST ── */
.master-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:8px;}
.master-item span{flex:1;font-size:13px;}
.master-sub{font-size:11px;color:var(--text3);}

/* ── SETTINGS ── */
.setting-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.setting-label{flex:1;font-size:13px;color:var(--text2);}
.setting-value{font-size:13px;color:var(--text);}

/* ── BREAKDOWN CHART (収支) ── */
.breakdown-list{margin-top:10px;}
.breakdown-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.breakdown-name{color:var(--text2);}
.breakdown-val{color:var(--text);}
.breakdown-val.green{color:var(--green);}
.breakdown-val.red{color:var(--red);}

/* ── LOADING ── */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;}

/* ── TITLE EDIT MODAL ── */
.title-input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:16px;font-weight:600;outline:none;}
.title-input:focus{border-color:var(--accent);}

@media(min-width:600px){.content{padding:20px;}}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===================== STORAGE =====================
const SK = 'gisho_nippo_v3';
const MK = 'gisho_master_v3';
const CK = 'gisho_clients_v3';
const TK = 'gisho_title_v1';

const load = k => { try { const r=localStorage.getItem(k); return r?JSON.parse(r):null; } catch{return null;} };
const save = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };

const loadReports = () => load(SK) || {};
const saveReports = d => save(SK,d);
const loadMaster = () => load(MK) || {sites:[],clients:[],workers:[],subs:[],materials:[],consumables:[]};
const saveMaster = m => save(MK,m);
const loadClients = () => load(CK) || {}; // {clientName: {closingDay:25}}
const saveClients = c => save(CK,c);
const loadTitle = () => load(TK) || '株式会社技匠 作業日報';
const saveTitle = t => save(TK,t);

// ===================== HELPERS =====================
const fmt = n => n.toLocaleString('ja-JP');
const ym = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const ymd = d => `${ym(d)}-${String(d.getDate()).padStart(2,'0')}`;
const today = () => ymd(new Date());
const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const newRow = () => ({id:newId(), name:'', qty:'', price:''});

const calcRows = rows => rows.reduce((s,r)=>{
  const q=parseFloat(r.qty)||0, p=parseFloat(r.price)||0;
  return s+q*p;
},0);

// ===================== ADDRESS SEARCH =====================
let addrTimer = null;
async function searchAddress(query, callback) {
  clearTimeout(addrTimer);
  if(!query || query.length < 2){ callback([]); return; }
  addrTimer = setTimeout(async ()=>{
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=jp&limit=5&addressdetails=1&accept-language=ja`;
      const res = await fetch(url, {headers:{'User-Agent':'gisho-nippo/1.0'}});
      const data = await res.json();
      const results = data.map(item => {
        const a = item.address;
        const parts = [
          a.province || a.state || '',
          a.city || a.town || a.village || a.county || '',
          a.suburb || a.neighbourhood || '',
          a.road || '',
          a.house_number || ''
        ].filter(Boolean);
        return { display: parts.join(''), full: item.display_name };
      });
      callback(results);
    } catch(e) {
      callback([]);
    }
  }, 500);
}

// ===================== STATE =====================
let state = {
  tab: 'home',
  ym: ym(new Date()),
  reports: loadReports(),
  master: loadMaster(),
  clients: loadClients(),
  title: loadTitle(),
  editingId: null,
  showTitleModal: false,
  showMasterTab: 'sites',
  addrCandidates: [],
  addrLoading: false,
  // 収支タブ
  reportFilter: 'all', // 'all' or clientName
  reportFilterYm: ym(new Date()),
};

// ===================== RENDER =====================
function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  return `
    ${buildHeader()}
    ${buildTabs()}
    <div class="content">
      ${state.tab==='home' ? buildHome() :
        state.tab==='new' ? buildForm(null) :
        state.tab==='reports' ? buildReports() :
        state.tab==='summary' ? buildSummary() :
        state.tab==='master' ? buildMaster() :
        state.tab==='settings' ? buildSettings() : ''}
    </div>
    ${state.editingId ? buildEditModal() : ''}
    ${state.showTitleModal ? buildTitleModal() : ''}
  `;
}

function buildHeader() {
  return `
    <div class="header">
      <div class="header-title">${state.title}</div>
      <button class="header-edit-btn" id="btn-edit-title">✏️ タイトル変更</button>
    </div>
  `;
}

function buildTabs() {
  const tabs = [
    {id:'home',label:'🏠 ホーム'},
    {id:'new',label:'＋ 新規'},
    {id:'reports',label:'📋 日報'},
    {id:'summary',label:'💹 収支'},
    {id:'master',label:'⚙ マスタ'},
    {id:'settings',label:'🔧 設定'},
  ];
  return `<div class="tabs">${tabs.map(t=>
    `<button class="tab${state.tab===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`
  ).join('')}</div>`;
}

// ── HOME ──
function buildHome() {
  const rpts = Object.values(state.reports);
  const thisMonth = rpts.filter(r=>r.date&&r.date.startsWith(state.ym));
  const totalSales = thisMonth.reduce((s,r)=>s+(parseFloat(r.sales)||0),0);
  const totalExp = thisMonth.reduce((s,r)=>s+calcExp(r),0);
  const profit = totalSales - totalExp;

  const recentRpts = [...rpts].sort((a,b)=>b.date>a.date?1:-1).slice(0,5);

  const ymDate = new Date(state.ym+'-01');
  const ymLabel = `${ymDate.getFullYear()}年${ymDate.getMonth()+1}月`;

  return `
    <div class="month-nav">
      <button class="month-btn" id="btn-prev-ym">＜</button>
      <div class="month-label">${ymLabel}</div>
      <button class="month-btn" id="btn-next-ym">＞</button>
    </div>
    <div class="summary-panel">
      <div class="summary-row">
        <span class="summary-label">売上合計</span>
        <span class="summary-value">¥${fmt(totalSales)}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">経費合計</span>
        <span class="summary-value">¥${fmt(totalExp)}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">粗利益</span>
        <span class="summary-value ${profit>=0?'green':'red'}">¥${fmt(profit)}</span>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">直近の日報</div>
    ${recentRpts.length===0?'<div class="loading">日報がまだありません</div>':
      recentRpts.map(r=>buildReportItem(r)).join('')}
  `;
}

function calcExp(r) {
  return (parseFloat(r.highway)||0)
       + (parseFloat(r.parking)||0)
       + calcRows(r.materials||[])
       + calcRows(r.consumables||[]);
}

// ── FORM ──
function buildForm(id) {
  const r = id ? state.reports[id] : {
    id: newId(),
    date: today(),
    site: '', address: '',
    distance: '', client: '',
    workers: [{id:newId(),name:'',count:''}],
    subs: [{id:newId(),name:'',count:''}],
    work: '',
    materials: [newRow()],
    consumables: [newRow()],
    highway: '', parking: '',
    sales: '', note: ''
  };
  const mats = r.materials||[newRow()];
  const cons = r.consumables||[newRow()];

  const masterSites = state.master.sites||[];
  const masterClients = state.master.clients||[];

  return `
    <div class="card">
      <div class="card-title">基本情報</div>
      <label>日付</label>
      <input type="date" id="f-date" value="${r.date||today()}">
      <label>現場名</label>
      <input type="text" id="f-site" value="${r.site||''}" placeholder="現場名を入力" list="list-sites">
      <datalist id="list-sites">${masterSites.map(s=>`<option value="${s}">`).join('')}</datalist>
      <label>住所</label>
      <div class="addr-wrap">
        <input type="text" id="f-address" value="${r.address||''}" placeholder="住所を入力すると候補が出ます" autocomplete="off">
        <div class="addr-candidates" id="addr-candidates" style="display:none;"></div>
      </div>
      <label>移動距離（km）</label>
      <input type="number" id="f-distance" value="${r.distance||''}" placeholder="0">
      <label>元請け</label>
      <input type="text" id="f-client" value="${r.client||''}" placeholder="元請け会社名" list="list-clients">
      <datalist id="list-clients">${masterClients.map(c=>`<option value="${c}">`).join('')}</datalist>
    </div>

    <div class="card">
      <div class="card-title">作業員</div>
      <div id="workers-wrap">
        ${(r.workers||[{id:newId(),name:'',count:''}]).map((w,i)=>`
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;" data-worker-idx="${i}">
            <input type="text" class="w-name" value="${w.name||''}" placeholder="作業員名" list="list-workers" style="flex:1;">
            <datalist id="list-workers">${(state.master.workers||[]).map(m=>`<option value="${m}">`).join('')}</datalist>
            <input type="number" class="w-count" value="${w.count||''}" placeholder="人数" style="width:70px;">
            <button class="btn-danger" onclick="removeWorker(${i})">✕</button>
          </div>
        `).join('')}
      </div>
      <button class="btn-ghost" id="btn-add-worker">＋ 作業員追加</button>
    </div>

    <div class="card">
      <div class="card-title">外注</div>
      <div id="subs-wrap">
        ${(r.subs||[{id:newId(),name:'',count:''}]).map((s,i)=>`
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;" data-sub-idx="${i}">
            <input type="text" class="s-name" value="${s.name||''}" placeholder="外注会社名" list="list-subs" style="flex:1;">
            <datalist id="list-subs">${(state.master.subs||[]).map(m=>`<option value="${m}">`).join('')}</datalist>
            <input type="number" class="s-count" value="${s.count||''}" placeholder="人数" style="width:70px;">
            <button class="btn-danger" onclick="removeSub(${i})">✕</button>
          </div>
        `).join('')}
      </div>
      <button class="btn-ghost" id="btn-add-sub">＋ 外注追加</button>
    </div>

    <div class="card">
      <div class="card-title">作業内容</div>
      <textarea id="f-work" placeholder="作業内容を入力">${r.work||''}</textarea>
    </div>

    <div class="card">
      <div class="card-title">材料費</div>
      <table class="detail-table">
        <thead><tr><th>品名</th><th>数量</th><th>単価</th><th></th></tr></thead>
        <tbody id="materials-body">
          ${mats.map((m,i)=>buildDetailRow('mat',m,i)).join('')}
        </tbody>
      </table>
      <div class="sub-total" id="mat-total">合計: ¥${fmt(calcRows(mats))}</div>
      <button class="btn-ghost" id="btn-add-mat">＋ 行追加</button>
    </div>

    <div class="card">
      <div class="card-title">消耗品費</div>
      <table class="detail-table">
        <thead><tr><th>品名</th><th>数量</th><th>単価</th><th></th></tr></thead>
        <tbody id="consumables-body">
          ${cons.map((c,i)=>buildDetailRow('con',c,i)).join('')}
        </tbody>
      </table>
      <div class="sub-total" id="con-total">合計: ¥${fmt(calcRows(cons))}</div>
      <button class="btn-ghost" id="btn-add-con">＋ 行追加</button>
    </div>

    <div class="card">
      <div class="card-title">交通費 / 売上</div>
      <label>高速代（円）</label>
      <input type="number" id="f-highway" value="${r.highway||''}" placeholder="0">
      <label>駐車場代（円）</label>
      <input type="number" id="f-parking" value="${r.parking||''}" placeholder="0">
      <label>売上（請求額）（円）</label>
      <input type="number" id="f-sales" value="${r.sales||''}" placeholder="0" style="border-color:var(--accent2);">
    </div>

    <div class="card">
      <div class="card-title">メモ</div>
      <textarea id="f-note" placeholder="備考・メモ">${r.note||''}</textarea>
    </div>

    <div style="display:flex;gap:10px;margin-top:4px;margin-bottom:24px;">
      <button class="btn btn-primary" style="flex:1;" id="btn-save-form" data-id="${r.id}">保存</button>
      ${id ? `<button class="btn-danger" id="btn-delete-form" data-id="${id}">削除</button>` : ''}
    </div>
  `;
}

function buildDetailRow(type, row, idx) {
  const matList = (state.master.materials||[]).map(m=>`<option value="${m}">`).join('');
  const conList = (state.master.consumables||[]).map(m=>`<option value="${m}">`).join('');
  const listId = type==='mat' ? 'list-mat-names' : 'list-con-names';
  const listHtml = type==='mat' ? `<datalist id="${listId}">${matList}</datalist>` : `<datalist id="${listId}">${conList}</datalist>`;
  return `
    <tr data-${type}-idx="${idx}">
      <td>${listHtml}<input type="text" class="${type}-name" value="${row.name||''}" placeholder="品名" list="${listId}"></td>
      <td><input type="number" class="${type}-qty" value="${row.qty||''}" placeholder="1" style="width:60px;"></td>
      <td><input type="number" class="${type}-price" value="${row.price||''}" placeholder="0"></td>
      <td><button class="btn-danger" style="padding:3px 7px;" onclick="removeDetailRow('${type}',${idx})">✕</button></td>
    </tr>
  `;
}

// ── REPORTS LIST ──
function buildReports() {
  const rpts = Object.values(state.reports)
    .filter(r=>r.date&&r.date.startsWith(state.ym))
    .sort((a,b)=>b.date>a.date?1:-1);

  const ymDate = new Date(state.ym+'-01');
  const ymLabel = `${ymDate.getFullYear()}年${ymDate.getMonth()+1}月`;

  return `
    <div class="month-nav">
      <button class="month-btn" id="btn-prev-ym">＜</button>
      <div class="month-label">${ymLabel}</div>
      <button class="month-btn" id="btn-next-ym">＞</button>
    </div>
    ${rpts.length===0?'<div class="loading">この月の日報はありません</div>':
      rpts.map(r=>buildReportItem(r,true)).join('')}
  `;
}

function buildReportItem(r, clickable=false) {
  const exp = calcExp(r);
  const sales = parseFloat(r.sales)||0;
  const profit = sales - exp;
  return `
    <div class="report-item" ${clickable?`data-edit-id="${r.id}"`:''}>
      <div class="report-item-top">
        <div class="report-site">${r.site||'（現場名なし）'}</div>
        <div class="report-date">${r.date||''}</div>
      </div>
      <div class="report-meta">${r.client||''} ${r.address?'📍'+r.address.slice(0,20)+'...':''}</div>
      <div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;">
        ${sales>0?`<span class="badge badge-green">売上 ¥${fmt(sales)}</span>`:''}
        ${exp>0?`<span style="font-size:11px;color:var(--text3);">経費 ¥${fmt(exp)}</span>`:''}
        ${sales>0?`<span class="badge ${profit>=0?'badge-green':'badge-red'}">粗利 ¥${fmt(profit)}</span>`:''}
      </div>
    </div>
  `;
}

// ── SUMMARY ──
function buildSummary() {
  const clients = state.master.clients || [];
  const clientsData = state.clients;
  const allRpts = Object.values(state.reports);

  const ymDate = new Date(state.reportFilterYm+'-01');
  const ymLabel = `${ymDate.getFullYear()}年${ymDate.getMonth()+1}月`;

  // フィルター対象の日報
  let filtered = allRpts.filter(r=>{
    if(!r.date) return false;
    if(state.reportFilter==='all') return r.date.startsWith(state.reportFilterYm);
    return r.client===state.reportFilter && r.date.startsWith(state.reportFilterYm);
  });

  const totalSales = filtered.reduce((s,r)=>s+(parseFloat(r.sales)||0),0);
  const totalExp = filtered.reduce((s,r)=>s+calcExp(r),0);
  const profit = totalSales - totalExp;
  const margin = totalSales>0 ? (profit/totalSales*100).toFixed(1) : '0.0';

  // 元請け別サマリ
  const clientSummary = {};
  allRpts.filter(r=>r.date&&r.date.startsWith(state.reportFilterYm)).forEach(r=>{
    const c = r.client || '（未設定）';
    if(!clientSummary[c]) clientSummary[c]={sales:0,exp:0,count:0};
    clientSummary[c].sales += parseFloat(r.sales)||0;
    clientSummary[c].exp += calcExp(r);
    clientSummary[c].count++;
  });

  return `
    <div class="month-nav">
      <button class="month-btn" id="btn-prev-ym-s">＜</button>
      <div class="month-label">${ymLabel}</div>
      <button class="month-btn" id="btn-next-ym-s">＞</button>
    </div>

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      <button class="btn btn-sm ${state.reportFilter==='all'?'btn-primary':'btn-ghost'}" data-filter="all">全体</button>
      ${clients.map(c=>`
        <button class="btn btn-sm ${state.reportFilter===c?'btn-primary':'btn-ghost'}" data-filter="${c}">${c}</button>
      `).join('')}
    </div>

    <div class="summary-panel">
      <div class="summary-row"><span class="summary-label">売上合計</span><span class="summary-value">¥${fmt(totalSales)}</span></div>
      <div class="summary-row"><span class="summary-label">経費合計</span><span class="summary-value">¥${fmt(totalExp)}</span></div>
      <div class="summary-row"><span class="summary-label">粗利益</span><span class="summary-value ${profit>=0?'green':'red'}">¥${fmt(profit)}</span></div>
      <div class="summary-row"><span class="summary-label">粗利率</span><span class="summary-value ${profit>=0?'green':'red'}">${margin}%</span></div>
    </div>

    <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">元請け別（${ymLabel}）</div>
    ${Object.entries(clientSummary).map(([name,d])=>{
      const p = d.sales - d.exp;
      const m = d.sales>0?(p/d.sales*100).toFixed(1):'0.0';
      const cd = clientsData[name];
      return `
        <div class="card" style="margin-bottom:10px;">
          <div class="card-header">
            <div class="card-title">${name}</div>
            <div style="font-size:11px;color:var(--text3);">締め日: ${cd?cd.closingDay+'日':'未設定'} / ${d.count}件</div>
          </div>
          <div class="breakdown-item"><span class="breakdown-name">売上</span><span class="breakdown-val green">¥${fmt(d.sales)}</span></div>
          <div class="breakdown-item"><span class="breakdown-name">経費</span><span class="breakdown-val">¥${fmt(d.exp)}</span></div>
          <div class="breakdown-item"><span class="breakdown-name">粗利益</span><span class="breakdown-val ${p>=0?'green':'red'}">¥${fmt(p)}</span></div>
          <div class="breakdown-item"><span class="breakdown-name">粗利率</span><span class="breakdown-val ${p>=0?'green':'red'}">${m}%</span></div>
        </div>
      `;
    }).join('') || '<div class="loading">この月のデータはありません</div>'}
  `;
}

// ── MASTER ──
function buildMaster() {
  const tabs = ['sites','clients','workers','subs','materials','consumables'];
  const labels = {sites:'現場',clients:'元請け',workers:'作業員',subs:'外注',materials:'材料名',consumables:'消耗品名'};
  const t = state.showMasterTab;
  const items = state.master[t] || [];
  const clientsData = state.clients;

  return `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      ${tabs.map(k=>`<button class="btn btn-sm ${t===k?'btn-primary':'btn-ghost'}" data-master-tab="${k}">${labels[k]}</button>`).join('')}
    </div>

    ${t==='clients' ? buildClientsMaster(items, clientsData) : `
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="text" id="master-new-val" placeholder="${labels[t]}名を入力" style="flex:1;">
        <button class="btn btn-primary btn-sm" id="btn-master-add">追加</button>
      </div>
      ${items.map((item,i)=>`
        <div class="master-item">
          <span>${item}</span>
          <button class="btn-danger" data-master-del="${i}">削除</button>
        </div>
      `).join('') || '<div class="loading">まだ登録がありません</div>'}
    `}
  `;
}

function buildClientsMaster(items, clientsData) {
  return `
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input type="text" id="master-new-val" placeholder="元請け会社名" style="flex:1;">
      <button class="btn btn-primary btn-sm" id="btn-master-add">追加</button>
    </div>
    ${items.map((item,i)=>`
      <div class="card" style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="flex:1;font-weight:600;">${item}</span>
          <button class="btn-danger" data-master-del="${i}">削除</button>
        </div>
        <label>締め日（例: 25 → 毎月25日締め）</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="number" class="client-closing" data-client="${item}" value="${clientsData[item]?clientsData[item].closingDay:''}" placeholder="25" style="width:80px;" min="1" max="31">
          <span style="font-size:12px;color:var(--text3);">日締め</span>
          <button class="btn btn-sm btn-primary client-closing-save" data-client="${item}">保存</button>
        </div>
      </div>
    `).join('') || '<div class="loading">まだ登録がありません</div>'}
  `;
}

// ── SETTINGS ──
function buildSettings() {
  const total = Object.keys(state.reports).length;
  const dataStr = JSON.stringify({reports:state.reports, master:state.master, clients:state.clients, title:state.title});
  const blob = 'data:application/json;charset=utf-8,'+encodeURIComponent(dataStr);
  return `
    <div class="card">
      <div class="card-title">データ管理</div>
      <div class="setting-row">
        <span class="setting-label">登録日報数</span>
        <span class="setting-value">${total}件</span>
      </div>
      <div style="margin-top:12px;display:flex;flex-direction:column;gap:10px;">
        <a href="${blob}" download="gisho_nippo_backup.json" class="btn btn-primary" style="text-decoration:none;text-align:center;">📥 バックアップ出力</a>
        <button class="btn-ghost" id="btn-import-open">📤 データ取り込み</button>
        <input type="file" id="import-file" accept=".json" style="display:none;">
        <button class="btn-danger" id="btn-clear-all">⚠ 全データ削除</button>
      </div>
    </div>
    <div class="card" style="margin-top:12px;">
      <div class="card-title">アプリについて</div>
      <div class="setting-row"><span class="setting-label">バージョン</span><span class="setting-value">v3.0</span></div>
      <div class="setting-row"><span class="setting-label">制作</span><span class="setting-value">株式会社技匠</span></div>
    </div>
  `;
}

// ── EDIT MODAL ──
function buildEditModal() {
  return `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div style="display:flex;align-items:center;margin-bottom:16px;">
          <div class="modal-title" style="margin:0;">日報を編集</div>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        ${buildForm(state.editingId)}
      </div>
    </div>
  `;
}

// ── TITLE MODAL ──
function buildTitleModal() {
  return `
    <div class="modal-overlay" id="title-modal-overlay">
      <div class="modal">
        <div style="display:flex;align-items:center;margin-bottom:16px;">
          <div class="modal-title" style="margin:0;">タイトルを変更</div>
          <button class="modal-close" id="title-modal-close">✕</button>
        </div>
        <label>アプリタイトル</label>
        <input class="title-input" id="title-input-val" value="${state.title}" placeholder="株式会社技匠 作業日報">
        <div style="margin-top:14px;display:flex;gap:10px;">
          <button class="btn btn-primary" id="btn-save-title" style="flex:1;">保存</button>
        </div>
      </div>
    </div>
  `;
}

// ===================== COLLECT FORM =====================
function collectForm() {
  const workers = [];
  document.querySelectorAll('[data-worker-idx]').forEach(row=>{
    const name = row.querySelector('.w-name')?.value||'';
    const count = row.querySelector('.w-count')?.value||'';
    if(name||count) workers.push({id:newId(),name,count});
  });
  const subs = [];
  document.querySelectorAll('[data-sub-idx]').forEach(row=>{
    const name = row.querySelector('.s-name')?.value||'';
    const count = row.querySelector('.s-count')?.value||'';
    if(name||count) subs.push({id:newId(),name,count});
  });
  const materials = [];
  document.querySelectorAll('[data-mat-idx]').forEach(row=>{
    const name = row.querySelector('.mat-name')?.value||'';
    const qty = row.querySelector('.mat-qty')?.value||'';
    const price = row.querySelector('.mat-price')?.value||'';
    materials.push({id:newId(),name,qty,price});
  });
  const consumables = [];
  document.querySelectorAll('[data-con-idx]').forEach(row=>{
    const name = row.querySelector('.con-name')?.value||'';
    const qty = row.querySelector('.con-qty')?.value||'';
    const price = row.querySelector('.con-price')?.value||'';
    consumables.push({id:newId(),name,qty,price});
  });

  return {
    date: document.getElementById('f-date')?.value||today(),
    site: document.getElementById('f-site')?.value||'',
    address: document.getElementById('f-address')?.value||'',
    distance: document.getElementById('f-distance')?.value||'',
    client: document.getElementById('f-client')?.value||'',
    workers, subs, work: document.getElementById('f-work')?.value||'',
    materials, consumables,
    highway: document.getElementById('f-highway')?.value||'',
    parking: document.getElementById('f-parking')?.value||'',
    sales: document.getElementById('f-sales')?.value||'',
    note: document.getElementById('f-note')?.value||'',
  };
}

// ===================== EVENTS =====================
function attachEvents() {
  // tabs
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.onclick = () => { state.tab=btn.dataset.tab; render(); };
  });

  // title modal
  document.getElementById('btn-edit-title')?.addEventListener('click',()=>{
    state.showTitleModal=true; render();
  });
  document.getElementById('title-modal-close')?.addEventListener('click',()=>{
    state.showTitleModal=false; render();
  });
  document.getElementById('title-modal-overlay')?.addEventListener('click', e=>{
    if(e.target.id==='title-modal-overlay'){state.showTitleModal=false;render();}
  });
  document.getElementById('btn-save-title')?.addEventListener('click',()=>{
    const val = document.getElementById('title-input-val')?.value.trim();
    if(val){ state.title=val; saveTitle(val); state.showTitleModal=false; render(); }
  });

  // month nav
  document.getElementById('btn-prev-ym')?.addEventListener('click',()=>{
    const d=new Date(state.ym+'-01'); d.setMonth(d.getMonth()-1); state.ym=ym(d); render();
  });
  document.getElementById('btn-next-ym')?.addEventListener('click',()=>{
    const d=new Date(state.ym+'-01'); d.setMonth(d.getMonth()+1); state.ym=ym(d); render();
  });
  document.getElementById('btn-prev-ym-s')?.addEventListener('click',()=>{
    const d=new Date(state.reportFilterYm+'-01'); d.setMonth(d.getMonth()-1); state.reportFilterYm=ym(d); render();
  });
  document.getElementById('btn-next-ym-s')?.addEventListener('click',()=>{
    const d=new Date(state.reportFilterYm+'-01'); d.setMonth(d.getMonth()+1); state.reportFilterYm=ym(d); render();
  });

  // 収支フィルター
  document.querySelectorAll('[data-filter]').forEach(btn=>{
    btn.onclick = () => { state.reportFilter=btn.dataset.filter; render(); };
  });

  // address search
  const addrInput = document.getElementById('f-address');
  const candidatesBox = document.getElementById('addr-candidates');
  if(addrInput && candidatesBox) {
    addrInput.addEventListener('input', ()=>{
      const q = addrInput.value.trim();
      if(!q || q.length<2){ candidatesBox.style.display='none'; return; }
      candidatesBox.innerHTML='<div class="addr-searching">検索中...</div>';
      candidatesBox.style.display='block';
      searchAddress(q, results=>{
        if(!results.length){ candidatesBox.style.display='none'; return; }
        candidatesBox.innerHTML = results.map(r=>`
          <div class="addr-candidate" data-addr="${r.display}">${r.display}</div>
        `).join('');
        candidatesBox.querySelectorAll('.addr-candidate').forEach(el=>{
          el.onclick = ()=>{
            addrInput.value = el.dataset.addr;
            candidatesBox.style.display='none';
          };
        });
      });
    });
    document.addEventListener('click', e=>{
      if(!addrInput.contains(e.target)&&!candidatesBox.contains(e.target)){
        candidatesBox.style.display='none';
      }
    });
  }

  // save form
  document.getElementById('btn-save-form')?.addEventListener('click', function(){
    const id = this.dataset.id;
    const data = collectForm();
    data.id = id;
    state.reports[id] = data;
    saveReports(state.reports);
    // マスタ自動登録
    const m = state.master;
    if(data.site && !m.sites.includes(data.site)) m.sites.push(data.site);
    if(data.client && !m.clients.includes(data.client)) m.clients.push(data.client);
    data.workers.forEach(w=>{ if(w.name&&!m.workers.includes(w.name)) m.workers.push(w.name); });
    data.subs.forEach(s=>{ if(s.name&&!m.subs.includes(s.name)) m.subs.push(s.name); });
    saveMaster(m);
    state.tab='reports'; state.editingId=null; render();
  });

  // delete form
  document.getElementById('btn-delete-form')?.addEventListener('click', function(){
    if(confirm('この日報を削除しますか？')){
      delete state.reports[this.dataset.id];
      saveReports(state.reports);
      state.editingId=null; state.tab='reports'; render();
    }
  });

  // add worker/sub rows
  document.getElementById('btn-add-worker')?.addEventListener('click',()=>{
    const wrap=document.getElementById('workers-wrap');
    const idx=wrap.querySelectorAll('[data-worker-idx]').length;
    const div=document.createElement('div');
    div.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:6px;';
    div.setAttribute('data-worker-idx',idx);
    div.innerHTML=`<input type="text" class="w-name" placeholder="作業員名" list="list-workers" style="flex:1;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;outline:none;"><input type="number" class="w-count" placeholder="人数" style="width:70px;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;outline:none;"><button class="btn-danger" onclick="removeWorker(${idx})">✕</button>`;
    wrap.appendChild(div);
  });
  document.getElementById('btn-add-sub')?.addEventListener('click',()=>{
    const wrap=document.getElementById('subs-wrap');
    const idx=wrap.querySelectorAll('[data-sub-idx]').length;
    const div=document.createElement('div');
    div.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:6px;';
    div.setAttribute('data-sub-idx',idx);
    div.innerHTML=`<input type="text" class="s-name" placeholder="外注会社名" list="list-subs" style="flex:1;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;outline:none;"><input type="number" class="s-count" placeholder="人数" style="width:70px;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;outline:none;"><button class="btn-danger" onclick="removeSub(${idx})">✕</button>`;
    wrap.appendChild(div);
  });

  // add detail rows
  document.getElementById('btn-add-mat')?.addEventListener('click',()=>{
    const tbody=document.getElementById('materials-body');
    const idx=tbody.querySelectorAll('tr').length;
    const tr=document.createElement('tr');
    tr.setAttribute('data-mat-idx',idx);
    tr.innerHTML=buildDetailRow('mat',newRow(),idx);
    tbody.appendChild(tr);
  });
  document.getElementById('btn-add-con')?.addEventListener('click',()=>{
    const tbody=document.getElementById('consumables-body');
    const idx=tbody.querySelectorAll('tr').length;
    const tr=document.createElement('tr');
    tr.setAttribute('data-con-idx',idx);
    tr.innerHTML=buildDetailRow('con',newRow(),idx);
    tbody.appendChild(tr);
  });

  // real-time total update
  document.getElementById('materials-body')?.addEventListener('input',()=>{
    const rows=[];
    document.querySelectorAll('[data-mat-idx]').forEach(r=>{
      rows.push({qty:r.querySelector('.mat-qty')?.value||'0',price:r.querySelector('.mat-price')?.value||'0'});
    });
    const el=document.getElementById('mat-total');
    if(el) el.textContent='合計: ¥'+fmt(calcRows(rows.map(r=>({qty:r.qty,price:r.price}))));
  });
  document.getElementById('consumables-body')?.addEventListener('input',()=>{
    const rows=[];
    document.querySelectorAll('[data-con-idx]').forEach(r=>{
      rows.push({qty:r.querySelector('.con-qty')?.value||'0',price:r.querySelector('.con-price')?.value||'0'});
    });
    const el=document.getElementById('con-total');
    if(el) el.textContent='合計: ¥'+fmt(calcRows(rows.map(r=>({qty:r.qty,price:r.price}))));
  });

  // report items click -> edit
  document.querySelectorAll('[data-edit-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.editingId=el.dataset.editId; state.tab='reports'; render();
    });
  });

  // modal close
  document.getElementById('modal-close')?.addEventListener('click',()=>{
    state.editingId=null; render();
  });
  document.getElementById('modal-overlay')?.addEventListener('click',e=>{
    if(e.target.id==='modal-overlay'){state.editingId=null;render();}
  });

  // master tabs
  document.querySelectorAll('[data-master-tab]').forEach(btn=>{
    btn.onclick=()=>{ state.showMasterTab=btn.dataset.masterTab; render(); };
  });

  // master add
  document.getElementById('btn-master-add')?.addEventListener('click',()=>{
    const val=document.getElementById('master-new-val')?.value.trim();
    if(!val) return;
    const t=state.showMasterTab;
    if(!state.master[t]) state.master[t]=[];
    if(!state.master[t].includes(val)) state.master[t].push(val);
    saveMaster(state.master);
    render();
  });

  // master delete
  document.querySelectorAll('[data-master-del]').forEach(btn=>{
    btn.onclick=()=>{
      const i=parseInt(btn.dataset.masterDel);
      state.master[state.showMasterTab].splice(i,1);
      saveMaster(state.master);
      render();
    };
  });

  // client closing day save
  document.querySelectorAll('.client-closing-save').forEach(btn=>{
    btn.onclick=()=>{
      const name=btn.dataset.client;
      const input=document.querySelector(`.client-closing[data-client="${name}"]`);
      const day=parseInt(input?.value)||0;
      if(day<1||day>31){alert('1〜31の数字を入力してください');return;}
      if(!state.clients[name]) state.clients[name]={};
      state.clients[name].closingDay=day;
      saveClients(state.clients);
      alert(`${name} の締め日を${day}日に設定しました`);
    };
  });

  // settings
  document.getElementById('btn-import-open')?.addEventListener('click',()=>{
    document.getElementById('import-file')?.click();
  });
  document.getElementById('import-file')?.addEventListener('change',e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.reports) { state.reports=d.reports; saveReports(d.reports); }
        if(d.master) { state.master=d.master; saveMaster(d.master); }
        if(d.clients) { state.clients=d.clients; saveClients(d.clients); }
        if(d.title) { state.title=d.title; saveTitle(d.title); }
        alert('取り込み完了しました');
        render();
      }catch{alert('ファイルの読み込みに失敗しました');}
    };
    reader.readAsText(file);
  });
  document.getElementById('btn-clear-all')?.addEventListener('click',()=>{
    if(confirm('全データを削除します。本当によろしいですか？')){
      state.reports={}; saveReports({});
      alert('削除しました');render();
    }
  });
}

// ===================== GLOBAL HELPERS (for inline onclick) =====================
window.removeWorker = idx=>{
  const el=document.querySelector(`[data-worker-idx="${idx}"]`);
  el?.remove();
};
window.removeSub = idx=>{
  const el=document.querySelector(`[data-sub-idx="${idx}"]`);
  el?.remove();
};
window.removeDetailRow = (type,idx)=>{
  const el=document.querySelector(`[data-${type}-idx="${idx}"]`);
  el?.remove();
};

// ===================== BOOT =====================
render();
</script>
</body>
</html>
